<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-light">
    <div class="container">
        <header>
            <h1>Productivity Dashboard</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon"></span>
            </button>
        </header>

        <main>
            <!-- Greeting Section -->
            <section class="greeting-section">
                <div id="current-time" class="current-time">00:00:00</div>
                <div id="current-date" class="current-date">Loading...</div>
                <h2 id="greeting-text" class="greeting">Good day!</h2>
                <input 
                    type="text" 
                    id="name-input" 
                    class="name-input" 
                    placeholder="Enter your name"
                    maxlength="50"
                />
            </section>

            <!-- Pomodoro Timer Section -->
            <section class="timer-section">
                <div id="timer-display" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="timer-start" class="btn-timer">Start</button>
                    <button id="timer-pause" class="btn-timer">Pause</button>
                    <button id="timer-reset" class="btn-timer">Reset</button>
                </div>
                <div class="timer-settings">
                    <label for="timer-duration">Duration (minutes):</label>
                    <input 
                        type="number" 
                        id="timer-duration" 
                        min="1" 
                        max="120" 
                        value="25"
                    />
                    <span id="timer-error" class="error-message"></span>
                </div>
            </section>

            <!-- Task Section -->
            <section class="task-section">
                <div class="task-controls">
                    <input 
                        type="text" 
                        id="task-input" 
                        class="task-input" 
                        placeholder="Add a new task"
                    />
                    <button id="task-add" class="btn-add">Add</button>
                </div>
                <span id="task-error" class="error-message"></span>
                
                <div class="sort-controls">
                    <label for="sort-select">Sort by:</label>
                    <select id="sort-select" class="sort-select">
                        <option value="date-newest">Newest First</option>
                        <option value="date-oldest">Oldest First</option>
                        <option value="alpha-az">A to Z</option>
                        <option value="alpha-za">Z to A</option>
                        <option value="status-incomplete">Incomplete First</option>
                        <option value="status-complete">Complete First</option>
                    </select>
                </div>
                
                <ul id="task-list" class="task-list"></ul>
            </section>
        </main>

                    <!-- Quick Links Section -->
            <section class="quick-links-section">
                <h2>🔗 Quick Links</h2>
                <div class="link-controls">
                    <input 
                        type="text" 
                        id="link-name-input" 
                        class="link-input" 
                        placeholder="Link name (e.g., Gmail)"
                        maxlength="50"
                    />
                    <input 
                        type="text" 
                        id="link-url-input" 
                        class="link-input" 
                        placeholder="URL (e.g., https://gmail.com)"
                    />
                    <button id="link-add" class="btn-add-link">Add Link</button>
                </div>
                <span id="link-error" class="error-message"></span>
                <div id="quick-links-container" class="quick-links-container"></div>
            </section>

        <!-- Storage Warning Banner -->
        <div id="storage-warning" class="storage-warning hidden">
            Storage unavailable. Your data will not be saved.
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
