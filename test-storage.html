<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Manager Test</title>
</head>
<body>
    <h1>Storage Manager Test</h1>
    <div id="results"></div>
    <div id="storage-warning" class="hidden">Storage unavailable. Your data will not be saved.</div>

    <script src="js/app.js"></script>
    <script>
        // Test the StorageManager
        const storage = new StorageManager();
        const results = document.getElementById('results');
        
        function log(message, success = true) {
            const p = document.createElement('p');
            p.textContent = message;
            p.style.color = success ? 'green' : 'red';
            results.appendChild(p);
        }

        // Test 1: Check availability
        log(`Storage available: ${storage.isAvailable()}`);

        // Test 2: Set and get string
        storage.set('testString', 'Hello World');
        const str = storage.get('testString');
        log(`String test: ${str === 'Hello World' ? 'PASS' : 'FAIL'}`, str === 'Hello World');

        // Test 3: Set and get object
        storage.set('testObject', { name: 'Test', value: 42 });
        const obj = storage.get('testObject');
        log(`Object test: ${obj && obj.name === 'Test' && obj.value === 42 ? 'PASS' : 'FAIL'}`, 
            obj && obj.name === 'Test' && obj.value === 42);

        // Test 4: Set and get array
        storage.set('testArray', [1, 2, 3]);
        const arr = storage.get('testArray');
        log(`Array test: ${arr && arr.length === 3 && arr[0] === 1 ? 'PASS' : 'FAIL'}`, 
            arr && arr.length === 3 && arr[0] === 1);

        // Test 5: Remove item
        storage.remove('testString');
        const removed = storage.get('testString');
        log(`Remove test: ${removed === null ? 'PASS' : 'FAIL'}`, removed === null);

        // Test 6: Get non-existent key
        const nonExistent = storage.get('nonExistentKey');
        log(`Non-existent key test: ${nonExistent === null ? 'PASS' : 'FAIL'}`, nonExistent === null);

        // Clean up
        storage.remove('testObject');
        storage.remove('testArray');

        log('All tests completed!');
    </script>
</body>
</html>
